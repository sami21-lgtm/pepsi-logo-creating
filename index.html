<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Pepsi Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="circle-card" id="interactiveCard">
            
            <div class="circle-content">
                <img src="pepsi-logo.png" alt="Pepsi Logo" class="pepsi-logo" id="pepsiLogo">
            </div>

            <div class="details-content">
                <div class="info-text">
                    <h2>PEPSI</h2>
                    <p>Pepsi is a cool, refreshing drink that satisfies your thirst and delights your taste buds. Our secret blend of flavors.</p>
                    <button class="shop-btn">Shop Now</button>
                </div>
                <div class="product-img-box">
                    <img src="pepsi-bottle.png" alt="Pepsi Bottle" class="pepsi-bottle">
                </div>
            </div>

        </div>
    </div>

    <script href="script.js"></script>
</body>
</html>

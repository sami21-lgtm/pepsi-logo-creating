<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animated Pepsi Mobile UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="circle-card" id="interactiveCard">
            
            <div class="circle-content">
                <div class="pulse-ring"></div>
                <img src="pepsi-logo.png" alt="Pepsi Logo" class="pepsi-logo">
            </div>

            <div class="details-content">
                <div class="info-text">
                    <h2>PEPSI</h2>
                    <p>Pepsi is a cool, refreshing drink that satisfies your thirst and delights your taste buds.</p>
                    <button class="shop-btn">Shop Now</button>
                </div>
                <div class="product-img-box">
                    <img src="pepsi-bottle.png" alt="Pepsi Bottle" class="pepsi-bottle">
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
